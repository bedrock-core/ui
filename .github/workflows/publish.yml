name: Publish Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Semver level to bump (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: write
  packages: read

jobs:
  publish-release:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get-latest-tag
        uses: actions-ecosystem/action-get-latest-tag@v1

      - name: Bump semver
        id: bump-semver
        uses: actions-ecosystem/action-bump-semver@v1
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: ${{ inputs.level }}

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
          scope: '@bedrock-core'

      - name: Install deps
        run: yarn install --immutable

      - name: Bump version of all packages
        run: |
          VER=${{ steps.bump-semver.outputs.new_version }}
          npm version $VER --no-git-tag-version
          npm version $VER --no-git-tag-version --prefix packages/ui-runtime
          npm version $VER --no-git-tag-version --prefix packages/flexbox
          npm version $VER --no-git-tag-version --prefix packages/navigation
          npm version $VER --no-git-tag-version --prefix packages/ore-styled
          npm version $VER --no-git-tag-version --prefix packages/cli

      - name: Set up Regolith
        uses: bedrock-core/setup-regolith@1.0.1
        with:
          regolith-version: '1.8.0'
          resolvers: |
            github.com/bedrock-core/regolith-filters

      - name: Install Regolith filters
        run: yarn regolith-install

      - name: Lint
        run: yarn lint

      - name: Build dist
        run: yarn build

      - name: Package Resource Pack (.mcpack)
        env:
          TAG: ${{ steps.bump-semver.outputs.new_version }}
        working-directory: packages/resource-pack/build/@bedrock-core_ui_rp
        run: zip -r "$GITHUB_WORKSPACE/core-ui-${TAG}.mcpack" .

      # ── Publish in topological order ───────────────────────────────────────────

      - name: Publish @bedrock-core/flexbox
        working-directory: packages/flexbox
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/flexbox@${{ steps.bump-semver.outputs.new_version }} version

      - name: Rewrite workspace deps → @bedrock-core/ui-runtime
        run: npm pkg set dependencies["@bedrock-core/flexbox"]="^${{ steps.bump-semver.outputs.new_version }}" --prefix packages/ui-runtime

      - name: Publish @bedrock-core/ui-runtime
        working-directory: packages/ui-runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/ui-runtime@${{ steps.bump-semver.outputs.new_version }} version

      - name: Rewrite workspace deps → @bedrock-core/navigation
        run: npm pkg set devDependencies["@bedrock-core/ui-runtime"]="^${{ steps.bump-semver.outputs.new_version }}" --prefix packages/navigation

      - name: Publish @bedrock-core/navigation
        working-directory: packages/navigation
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/navigation@${{ steps.bump-semver.outputs.new_version }} version

      - name: Rewrite workspace deps → @bedrock-core/ore-styled
        run: npm pkg set devDependencies["@bedrock-core/ui-runtime"]="^${{ steps.bump-semver.outputs.new_version }}" --prefix packages/ore-styled

      - name: Publish @bedrock-core/ore-styled
        working-directory: packages/ore-styled
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/ore-styled@${{ steps.bump-semver.outputs.new_version }} version

      - name: Publish @bedrock-core/cli
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/cli@${{ steps.bump-semver.outputs.new_version }} version

      - name: Rewrite workspace deps → @bedrock-core/ui (meta)
        run: |
          VER=${{ steps.bump-semver.outputs.new_version }}
          npm pkg set dependencies["@bedrock-core/ui-runtime"]="^$VER"
          npm pkg set dependencies["@bedrock-core/navigation"]="^$VER"
          npm pkg set dependencies["@bedrock-core/ore-styled"]="^$VER"
          npm pkg set dependencies["@bedrock-core/flexbox"]="^$VER"

      - name: Publish @bedrock-core/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || npm view @bedrock-core/ui@${{ steps.bump-semver.outputs.new_version }} version

      # ── Commit, tag, release ───────────────────────────────────────────────────

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            packages/ui-runtime/package.json \
            packages/flexbox/package.json \
            packages/navigation/package.json \
            packages/ore-styled/package.json \
            packages/cli/package.json
          git commit -m "bump-version: bump version to '${{ steps.bump-semver.outputs.new_version }}'"
          git push

      - name: Push tag
        uses: actions-ecosystem/action-push-tag@v1
        with:
          tag: ${{ steps.bump-semver.outputs.new_version }}
          message: 'Release ${{ steps.bump-semver.outputs.new_version }}'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-semver.outputs.new_version }}
          name: ${{ steps.bump-semver.outputs.new_version }}
          body: ${{ inputs.notes || format('Automated release {0}', steps.bump-semver.outputs.new_version) }}
          generate_release_notes: true
          files: |
            core-ui-${{ steps.bump-semver.outputs.new_version }}.mcpack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
